name: Update V2Ray Nodes

on:
  schedule:
      # Every day 09:00 (UTC 01:00) and 18:00 (UTC 10:00) Beijing Time    # Note: GitHub Actions may have 15-120 minutes of delay
          - cron: '0 4,10,16,22 * * *'
            workflow_dispatch: # Allow manual trigger

            jobs:
              build:
                  runs-on: ubuntu-latest

                      steps:
                          - name: Checkout code
                                uses: actions/checkout@v3

                                    - name: Setup Python
                                          uses: actions/setup-python@v4
                                                with:
                                                        python-version: '3.10'

                                                            - name: Install Chrome
                                                                  run: |
                                                                          sudo apt-get update
                                                                                  sudo apt-get install -y google-chrome-stable

                                                                                      - name: Install dependencies
                                                                                            run: |
                                                                                                    python -m pip install --upgrade pip
                                                                                                            pip install requests selenium webdriver-manager
                                                                                                            
                                                                                                                - name: Run script
                                                                                                                      run: python v2_cli.py
                                                                                                                      
                                                                                                                          - name: Commit and push
                                                                                                                                run: |
                                                                                                                                        git config --local user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                git config --local user.name "github-actions[bot]"
                                                                                                                                                        if [ ! -f nodes.txt ]; then
                                                                                                                                                                  echo "No nodes found at $(date)" > nodes.txt
                                                                                                                                                                          fi
                                                                                                                                                                                  git add nodes.txt
                                                                                                                                                                                          git commit -m "Auto Update [$(date +'%Y-%m-%d %H:%M')]" || echo "No changes to commit"
                                                                                                                                                                                                  git push || echo "No changes to push"
                                                                                                                                                                                                  
                                                                                                                                                                                                      - name: Output links
                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                    echo "### Node Access (China Accessibility)" >> $GITHUB_STEP_SUMMARY
                                                                                                                                                                                                                            echo "- **JsDelivr CDN**: https://cdn.jsdelivr.net/gh/${{ github.repository }}@main/nodes.txt" >> $GITHUB_STEP_SUMMARY
                                                                                                                                                                                                                                    echo "- **GitHub Raw**: https://raw.githubusercontent.com/${{ github.repository }}/main/nodes.txt" >> $GITHUB_STEP_SUMMARY
                                                                                                                                                                                                                                            echo "- **Dpaste Mirror**: Check 'Run script' logs for Dpaste links" >> $GITHUB_STEP_SUMMARY
                                                                                                                                                                                                                                            
