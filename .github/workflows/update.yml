name: Update V2Ray Nodes

on:
  schedule:
    # 每天北京时间 00:00, 06:00, 12:00, 18:00 运行
    # UTC 对应: 16:00, 22:00, 04:00, 10:00
    - cron: '0 4,10,16,22 * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 安装 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装 Chrome 浏览器
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install requests selenium webdriver-manager

    - name: 运行抓取脚本
      run: python v2_cli.py

    - name: 提交并推送到仓库
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        if [ ! -f nodes.txt ]; then
          echo "No nodes found at $(date)" > nodes.txt
        fi
        git add nodes.txt
        git commit -m "自动更新 [$(date +'%Y-%m-%d %H:%M')]" || echo "No changes to commit"
        git push || echo "No changes to push"

    - name: 输出访问链接
      run: |
        echo "### 🚀 节点访问地址 (China Accessibility)" >> $GITHUB_STEP_SUMMARY
        echo "- **JsDelivr CDN (推荐)**: https://cdn.jsdelivr.net/gh/${{ github.repository }}@main/nodes.txt" >> $GITHUB_STEP_SUMMARY
        echo "- **GitHub Raw**: https://raw.githubusercontent.com/${{ github.repository }}/main/nodes.txt" >> $GITHUB_STEP_SUMMARY
        echo "- **Dpaste Mirror**: 请在上方 '运行抓取脚本' 日志中寻找 Dpaste 链接" >> $GITHUB_STEP_SUMMARY
